<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/624acf4e3e.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class=" dashboard bg-white/5 backdrop-blur-md border border-cyan-500/30 rounded-2xl grid grid-cols-1 gap-6 p-6 ">

<h1 class="text-slate-100 lg:text-3xl text-2xl sm:tlg:ext-3xl  text-2xl sm:text-3xl flex justify-center"> EXPENSE TRACKER</h1>
   
<!--expense details container-->
<div class="bg-white/5 backdrop-blur-md border border-cyan-500/30 rounded-2xl p-6 ">
  <!--expense description-->  
<input class="expense-description" type="text" id="expense-description" placeholder="Enter expense description"/>

<!--amount in Ksh-->
<input class="amount" type="number" placeholder="enter amount"/>

<!--category-->
<h2>Select expense category</h2>
<input type="checkbox" id="category"/>

<!--add button-->
<button id="AddButton">Add Expense</button>


</div>

<!--Expense list-->
<div id="expense-list" class="bg-white/5 backdrop-blur-md border border-cyan-500/30 rounded-2xl p-6 ">

</div>

<!--card 3-->
<div class="bg-white/5 backdrop-blur-md border border-cyan-500/30 rounded-2xl p-6 ">

<h2 class="text-cyan-300" >Spending Insight</h2>

<li  class="text-sm sm:text-base lg:text-2xl text-slate-100" >“Food & snacks are your highest daily expense ”</li>
<li  class="text-sm sm:text-base lg:text-2xl text-slate-100" >“Transport spending increases on weekdays”</li>
<li  class="text-sm sm:text-base lg:text-2xl text-slate-100" >“Entertainment subscriptions are consistent monthly costs” </li>

</div>

</div>

</body>
</html>
