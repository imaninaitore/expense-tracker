<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/624acf4e3e.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="text-slate-100 lg:text-3xl text-2xl sm:tlg:ext-3xl  text-2xl sm:text-3xl flex justify-center"> EXPENSE TRACKER</h1>
  
<div class=" dashboard bg-white/5 backdrop-blur-md border border-cyan-500/30 rounded-2xl grid grid-cols-1 gap-6 p-6 ">

<!--DASHBOARD-->
<div class="bg-white/5 backdrop-blur-md border border-cyan-500/30 rounded-2xl p-6 ">
<h1 class="text-cyan-300" >My dashboard</h1>

<h2 id="total"></h2>

<h2>Filter Expenses</h2>

<select id="filter">
  <option value="All">All</option>
  <option value="Food">Food</option>
  <option value="Transport">Transport</option>
  <option value="Bills">Bills</option>
  <option value="Shopping">Shopping</option>
</select>
</div>

   
<!--expense details container-->
<div class="bg-white/5 backdrop-blur-md border border-cyan-500/30 rounded-2xl p-6 ">

<!--expense description-->  
<input class="expense-description" type="text" id="expense-description" placeholder="Enter expense description"/>

<!--amount in Ksh-->
<input id="amount" type="number" placeholder="enter amount"/>

<!--category-->
<h3>Select expense category</h3>

<label for="category">
<input type="radio" name="category" id="category1"/>
Food
</label>

<label for="category">
<input type="radio"  name="category" id="category2"/>
Transport
</label>

<label for="category">
<input type="radio"  name="category" id="category3"/>
Bills
</label>

<label for="category">
<input type="radio"  name="category" id="category4"/>
Shopping
</label>

<!--add button-->
<button class="AddButton" id="AddButton">Add Expense</button>
</div>


<!--Expense list-->
<div id="expense-list" class="expense-list"> </div>


</div>

<script src="script.js"></script>
</body>
</html>
